<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Advice generator app</title>
</head>
<body>
    <main>
      <section class="advice-card">
        <p class="advice-id"> ADVICE #117</P>
          <h1 class="advice-text"> "It is easy to sit up and take notice,
            what's difficult is getting up and taking action"</h1>
            <picture>
              <source media="(max-width:768px)" srcset="images/pattern-divider-mobile.svg">
               <img class="divider" src=images/pattern-divider-desktop.svg alt="pattern-divider-desktop">
            </picture>
          <button class="dice-btn">
            <img src="images/icon-dice.svg" alt="dice icon">
          </button>
      </section>
    </main>
</body>
<script src="script.js"></script>
</html>
